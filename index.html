<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ME1 — 100% Completion Log</title>
<!-- Home-screen / full-screen app behaviour (works for a locally-saved file) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ME1 100%">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0c10">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230a0c10'/%3E%3Crect x='28' y='40' width='124' height='100' rx='6' fill='none' stroke='%23d63a2f' stroke-width='6'/%3E%3Ctext x='90' y='108' font-family='Arial Black,sans-serif' font-size='58' font-weight='900' fill='%23d63a2f' text-anchor='middle'%3EN7%3C/text%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --void:#0a0c10; --panel:#11151c; --panel-edge:#1d2530;
    --n7-red:#d63a2f; --n7-red-bright:#ff4a3d; --amber:#e8a13c;
    --ice:#4ec3e0; --text:#c5cdd6; --text-dim:#6c7884; --done:#3fae6b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Rajdhani',sans-serif;
    background:radial-gradient(ellipse at top,#141923 0%,var(--void) 60%);
    color:var(--text); min-height:100vh; padding:0 0 90px; line-height:1.4;
  }
  .scanlines::before {
    content:""; position:fixed; inset:0;
    background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,0.18) 3px,rgba(0,0,0,0.18) 3px);
    pointer-events:none; z-index:999; opacity:0.4;
  }
  header {
    border-bottom:1px solid var(--panel-edge);
    background:linear-gradient(180deg,#0d1016 0%,transparent 100%);
    padding:34px 24px 26px; position:relative; overflow:hidden;
  }
  header::before {
    content:"N7"; position:absolute; right:-10px; top:-26px;
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:180px;
    color:#fff; opacity:0.02; letter-spacing:-8px;
  }
  .wrap { max-width:860px; margin:0 auto; }
  .eyebrow {
    font-family:'JetBrains Mono',monospace; font-size:11px;
    letter-spacing:0.35em; color:var(--n7-red); text-transform:uppercase;
    display:flex; align-items:center; gap:10px;
  }
  .eyebrow::before { content:""; width:22px; height:2px; background:var(--n7-red); }
  h1 {
    font-family:'Orbitron',sans-serif; font-weight:900;
    font-size:clamp(28px,6vw,46px); color:#f0f3f6;
    letter-spacing:0.02em; margin:10px 0 4px; line-height:1;
  }
  h1 span { color:var(--n7-red); }
  .subtitle { font-size:15px; color:var(--text-dim); letter-spacing:0.04em; font-weight:500; }

  /* control bar */
  .controls {
    max-width:860px; margin:20px auto 0; padding:0 24px;
    display:flex; flex-wrap:wrap; gap:18px 26px; align-items:center;
  }
  .toggle-row { display:flex; gap:10px; align-items:center; }
  .toggle-label { font-size:13px; letter-spacing:0.05em; color:var(--text-dim); font-weight:600; text-transform:uppercase; }
  .switch { position:relative; width:42px; height:22px; flex-shrink:0; cursor:pointer; }
  .switch input { opacity:0; width:0; height:0; }
  .slider {
    position:absolute; inset:0; background:#080a0e; border:1px solid var(--panel-edge);
    border-radius:22px; transition:0.2s;
  }
  .slider::before {
    content:""; position:absolute; height:14px; width:14px; left:3px; top:3px;
    background:var(--text-dim); border-radius:50%; transition:0.2s;
  }
  .switch input:checked + .slider { background:rgba(78,195,224,0.2); border-color:var(--ice); }
  .switch input:checked + .slider::before { transform:translateX(20px); background:var(--ice); }

  .seg { display:flex; border:1px solid var(--panel-edge); border-radius:3px; overflow:hidden; }
  .seg button {
    font-family:'Rajdhani',sans-serif; font-weight:600; font-size:12px;
    letter-spacing:0.08em; text-transform:uppercase; background:transparent;
    color:var(--text-dim); border:none; padding:7px 14px; cursor:pointer; transition:0.15s;
  }
  .seg button.active { background:var(--n7-red); color:#fff; }
  .seg button:not(.active):hover { color:var(--text); }

  .progress-shell { max-width:860px; margin:22px auto 0; padding:0 24px; }
  .progress-meta {
    display:flex; justify-content:space-between; align-items:flex-end;
    font-family:'JetBrains Mono',monospace; font-size:12px;
    color:var(--text-dim); margin-bottom:8px; letter-spacing:0.08em;
  }
  .progress-pct { font-family:'Orbitron',sans-serif; font-weight:700; font-size:22px; color:var(--amber); }
  .trilogy-total {
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em;
    color:var(--text-dim); margin-top:9px; text-align:right;
  }
  .trilogy-total b { color:var(--ice); font-weight:500; }
  .trilogy-total .seg-done { color:var(--done); }
  .bar {
    height:10px; background:#080a0e; border:1px solid var(--panel-edge);
    position:relative; overflow:hidden;
    clip-path:polygon(0 0,100% 0,calc(100% - 8px) 100%,0 100%);
  }
  .bar-fill {
    height:100%; background:linear-gradient(90deg,var(--n7-red) 0%,var(--n7-red-bright) 100%);
    box-shadow:0 0 14px rgba(214,58,47,0.6);
    transition:width 0.5s cubic-bezier(.2,.8,.2,1); width:0;
  }

  /* priority strip */
  .priority {
    max-width:860px; margin:24px auto 0; padding:0 24px;
  }
  .priority-inner {
    background:linear-gradient(90deg,rgba(214,58,47,0.08),transparent);
    border:1px solid rgba(214,58,47,0.3); border-left:3px solid var(--n7-red);
    padding:14px 18px;
  }
  .priority-title {
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.2em;
    color:var(--n7-red-bright); text-transform:uppercase; margin-bottom:8px;
    display:flex; align-items:center; gap:8px;
  }
  .priority-title::before { content:"⚠"; }
  .priority-item { font-size:14px; color:var(--text); margin:4px 0; padding-left:14px; position:relative; }
  .priority-item::before { content:"›"; position:absolute; left:0; color:var(--n7-red); }
  .priority-item.cleared { color:var(--text-dim); text-decoration:line-through; text-decoration-color:var(--done); }

  main { max-width:860px; margin:34px auto 0; padding:0 24px; }
  .phase {
    margin-bottom:30px; background:var(--panel);
    border:1px solid var(--panel-edge); border-left:3px solid var(--n7-red); position:relative;
  }
  .phase.planner-group { border-left-color:var(--ice); }
  .phase-head {
    display:flex; align-items:baseline; gap:14px; padding:18px 22px 14px;
    border-bottom:1px solid var(--panel-edge); cursor:pointer; user-select:none;
  }
  .phase-num {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:13px;
    color:var(--n7-red); border:1px solid var(--n7-red); border-radius:2px;
    padding:2px 7px; letter-spacing:0.1em; flex-shrink:0;
  }
  .planner-group .phase-num { color:var(--ice); border-color:var(--ice); }
  .phase-title {
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:16px;
    color:#e8edf2; letter-spacing:0.03em; flex:1;
  }
  .phase-count { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-dim); }
  .phase-note { padding:12px 22px 4px; font-size:14px; color:var(--text-dim); line-height:1.5; }
  .phase-note em { color:var(--ice); font-style:normal; }

  ul { list-style:none; padding:8px 14px 16px; }
  li.item { border-radius:3px; transition:background 0.15s; }
  li.item:hover { background:rgba(255,255,255,0.025); }
  .item-row { display:flex; align-items:flex-start; gap:12px; padding:11px 10px; }
  .checkzone { display:flex; gap:12px; flex:1; cursor:pointer; min-width:0; }
  .box {
    width:19px; height:19px; flex-shrink:0; margin-top:1px;
    border:1.5px solid var(--text-dim); border-radius:2px; position:relative; transition:all 0.18s;
  }
  li.done .box { border-color:var(--done); background:var(--done); }
  li.done .box::after {
    content:""; position:absolute; left:5px; top:1px; width:5px; height:10px;
    border:solid #0a0c10; border-width:0 2.5px 2.5px 0; transform:rotate(45deg);
  }
  .task { flex:1; min-width:0; }
  .task-name { font-size:15.5px; font-weight:600; color:var(--text); letter-spacing:0.01em; }
  li.done .task-name { color:var(--text-dim); text-decoration:line-through; text-decoration-color:var(--done); }
  .task-desc { font-size:13px; color:var(--text-dim); margin-top:2px; font-weight:400; }

  .tag {
    font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.1em;
    text-transform:uppercase; padding:2px 6px; border-radius:2px; margin-left:8px;
    vertical-align:middle; white-space:nowrap;
  }
  .tag.miss { background:rgba(214,58,47,0.15); color:var(--n7-red-bright); border:1px solid rgba(214,58,47,0.4); }
  .tag.opt  { background:rgba(108,120,132,0.12); color:var(--text-dim); border:1px solid var(--panel-edge); }
  .tag.loc  { background:rgba(78,195,224,0.12); color:var(--ice); border:1px solid rgba(78,195,224,0.35); }

  /* counter stepper */
  .counter {
    display:flex; align-items:center; gap:0; flex-shrink:0; margin-top:-2px;
    border:1px solid var(--panel-edge); border-radius:3px; overflow:hidden;
  }
  .counter button {
    width:26px; height:26px; background:#0c0f15; border:none; color:var(--text-dim);
    font-size:16px; font-weight:700; cursor:pointer; transition:0.15s; line-height:1;
  }
  .counter button:hover { background:var(--n7-red); color:#fff; }
  .counter .cval {
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text);
    min-width:48px; text-align:center; padding:0 4px; background:#080a0e;
  }
  .counter .cval.full { color:var(--done); }

  .btns-right { display:flex; gap:6px; flex-shrink:0; }
  .guide-btn, .note-btn {
    font-family:'JetBrains Mono',monospace; font-size:10px;
    letter-spacing:0.12em; text-transform:uppercase; background:transparent;
    color:var(--text-dim); border:1px solid var(--panel-edge); padding:4px 9px;
    cursor:pointer; border-radius:2px; transition:all 0.15s; margin-top:1px; align-self:flex-start;
  }
  .guide-btn:hover, .guide-btn.open { border-color:var(--ice); color:var(--ice); }
  .note-btn:hover, .note-btn.open { border-color:var(--amber); color:var(--amber); }
  .note-btn.has-note { border-color:var(--amber); color:var(--amber); }

  .guide {
    display:none; margin:0 10px 6px 41px; padding:12px 14px;
    background:#0c0f15; border-left:2px solid var(--ice);
    font-size:14px; line-height:1.55; color:var(--text);
  }
  .guide.show { display:block; }
  .guide strong { color:var(--ice); font-weight:600; }
  .guide .hl { color:var(--amber); }
  .build-intro { border-left-color:var(--amber); }
  .build-intro .phase-num { color:var(--amber); border-color:var(--amber); }
  .build-intro-body { padding:14px 22px 18px; font-size:14.5px; line-height:1.6; color:var(--text); }
  .build-section { border-left-color:var(--ice); }
  .build-bullet { color:var(--ice) !important; border-color:var(--ice) !important; }
  .build-h { font-size:15px !important; }
  .build-body { padding:14px 22px 18px; font-size:14.5px; line-height:1.62; color:var(--text); }
  .build-body b { color:var(--ice); font-weight:600; }
  .build-body i { color:var(--text-dim); font-style:normal; }
  .build-body ol.blist { margin:6px 0 4px; padding-left:0; counter-reset:step; list-style:none; }
  .build-body ol.blist li {
    position:relative; padding:7px 0 7px 34px; margin:0;
    border-bottom:1px solid rgba(29,37,48,0.6); line-height:1.5;
  }
  .build-body ol.blist li:last-child { border-bottom:none; }
  .build-body ol.blist li::before {
    counter-increment:step; content:counter(step);
    position:absolute; left:0; top:7px;
    width:22px; height:22px; border:1px solid var(--ice); color:var(--ice);
    border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600;
    display:flex; align-items:center; justify-content:center;
  }
  .guide .spoiler, .phase-note .spoiler, .build-body .spoiler {
    background:var(--text-dim); color:var(--text-dim); border-radius:2px;
    padding:0 2px; cursor:default; transition:0.2s; user-select:none;
  }
  body.show-spoilers .guide .spoiler,
  body.show-spoilers .phase-note .spoiler,
  body.show-spoilers .build-body .spoiler { background:rgba(214,58,47,0.12); color:var(--n7-red-bright); }

  .note-area {
    display:none; margin:0 10px 8px 41px;
  }
  .note-area.show { display:block; }
  .note-area textarea {
    width:100%; background:#0c0f15; border:1px solid var(--panel-edge);
    border-left:2px solid var(--amber); color:var(--text);
    font-family:'Rajdhani',sans-serif; font-size:14px; padding:9px 12px;
    resize:vertical; min-height:54px; border-radius:0 2px 2px 0;
  }
  .note-area textarea:focus { outline:none; border-color:var(--amber); }
  .note-area textarea::placeholder { color:var(--text-dim); }

  footer { max-width:860px; margin:30px auto 0; padding:0 24px; display:flex; gap:12px; flex-wrap:wrap; }
  .btn {
    font-family:'Rajdhani',sans-serif; font-weight:600; font-size:13px;
    letter-spacing:0.08em; text-transform:uppercase; background:transparent;
    color:var(--text-dim); border:1px solid var(--panel-edge); padding:9px 16px;
    cursor:pointer; transition:all 0.15s; border-radius:2px;
  }
  .btn:hover { border-color:var(--n7-red); color:var(--n7-red-bright); }
  .btn.amber:hover { border-color:var(--amber); color:var(--amber); }

  .complete-banner { display:none; text-align:center; margin:24px auto 0; max-width:860px; padding:0 24px; }
  .complete-banner.show { display:block; }
  .complete-banner div {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:18px;
    color:var(--amber); letter-spacing:0.15em; border:1px solid var(--amber);
    padding:16px; background:rgba(232,161,60,0.06); box-shadow:0 0 30px rgba(232,161,60,0.15);
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 30px rgba(232,161,60,0.15);} 50%{box-shadow:0 0 50px rgba(232,161,60,0.35);} }

  /* export modal */
  .modal-bg {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
    z-index:1000; align-items:center; justify-content:center; padding:24px;
  }
  .modal-bg.show { display:flex; }
  .modal {
    background:var(--panel); border:1px solid var(--panel-edge); border-top:3px solid var(--ice);
    max-width:560px; width:100%; padding:24px;
  }
  .modal h3 { font-family:'Orbitron',sans-serif; color:#e8edf2; font-size:16px; margin-bottom:14px; letter-spacing:0.04em; }
  .modal textarea {
    width:100%; height:240px; background:#080a0e; border:1px solid var(--panel-edge);
    color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px;
    padding:12px; resize:none; line-height:1.5;
  }
  .modal-actions { display:flex; gap:10px; margin-top:14px; justify-content:flex-end; }
  @media (max-width:560px) {
    .item-row { flex-wrap:wrap; }
    .btns-right { margin-left:31px; }
    .counter { margin-left:31px; }
  }
</style>
</head>
<body class="scanlines">
  <header>
    <div class="wrap">
      <div class="eyebrow">Systems Alliance // Completion Protocol</div>
      <h1>MASS EFFECT <span id="gameTitleNum">1</span></h1>
      <div class="subtitle">Legendary Edition — Trilogy 100% Log</div>
    </div>
  </header>

  <div class="controls">
    <div class="toggle-row">
      <span class="toggle-label">Game</span>
      <div class="seg" id="gameSeg">
        <button data-game="me1" class="active">ME1</button>
        <button data-game="me2">ME2</button>
        <button data-game="me3">ME3</button>
      </div>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">View</span>
      <div class="seg" id="viewSeg">
        <button data-view="phase" class="active">By Phase</button>
        <button data-view="planner">Session Planner</button>
        <button data-view="route">Route</button>
        <button data-view="build">Build</button>
      </div>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Spoilers</span>
      <label class="switch"><input type="checkbox" id="spoilerToggle"><span class="slider"></span></label>
    </div>
  </div>

  <div class="progress-shell">
    <div class="progress-meta">
      <span id="statusText">CALIBRATING...</span>
      <span class="progress-pct" id="pct">0%</span>
    </div>
    <div class="bar"><div class="bar-fill" id="barFill"></div></div>
    <div class="trilogy-total" id="trilogyTotal"></div>
  </div>

  <div class="priority" id="priorityStrip"></div>
  <div class="complete-banner" id="banner"><div>◆ MISSION COMPLETE — PLATINUM SECURED ◆</div></div>

  <main id="phases"></main>

  <footer>
    <button class="btn" id="expandAll">Expand all</button>
    <button class="btn" id="collapseAll">Collapse all</button>
    <button class="btn amber" id="exportBtn">Export / Import</button>
    <button class="btn" id="reset">Reset log</button>
  </footer>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3>Export / Import Progress</h3>
      <textarea id="exportArea" spellcheck="false"></textarea>
      <div class="modal-actions">
        <button class="btn amber" id="copyBtn">Copy</button>
        <button class="btn amber" id="importBtn">Import pasted code</button>
        <button class="btn" id="closeModal">Close</button>
      </div>
    </div>
  </div>

<script>
/* item fields:
   n=name, d=short desc, g=guide html, t=tag (miss/opt),
   max=counter target (enables stepper), loc=session-planner group key */
const DATA_ME1 = [
  { num:"P1", title:"Throwaway Adept — Biotic Grind",
    note:"Make a generic Adept (skip the creator). <em>Any damageable target counts</em> — crates, wildlife, Citadel transit terminals, the Mako. Squadmate casts count too.",
    items:[
      { n:"Throw Mastery", d:"Use Throw 25 times", max:25, loc:"grind",
        g:"Throw is available from Eden Prime onward. <strong>Save in front of a Citadel Rapid Transit terminal</strong> with cooldowns up, cast Throw, then reload — <span class='hl'>progress saves at the profile level, not the save file</span>, so reloading the same save 25 times grinds it out in minutes. The C-Sec Atrium terminal is the popular spot." },
      { n:"Warp Mastery", d:"Use Warp 25 times", max:25, loc:"grind",
        g:"Same terminal-and-reload method as Throw. Warp must hit a target to count, so aim at the transit terminal or any destructible object." },
      { n:"Barrier Mastery", d:"Use Barrier 25 times", max:25, loc:"grind",
        g:"The easiest of the set — <strong>Barrier is self-cast and needs no target</strong>. Stand anywhere, cast, wait for cooldown, repeat. No terminal needed." },
      { n:"Lift Mastery", d:"Use Lift 25 times", max:25, loc:"grind",
        g:"<span class='hl'>Requires 6 points in Throw before Lift unlocks.</span> Worth prioritising — finishing it grants <strong>Lift as a bonus talent</strong>, the strongest one to carry into your main run. Grind via the terminal method." },
      { n:"Singularity Mastery", d:"Use Singularity 25 times", max:25, loc:"grind",
        g:"A higher-tier biotic talent — invest several points to unlock it. Once available, grind on the terminal or on grouped enemies." },
      { n:"Stasis Mastery", d:"Use Stasis 25 times", max:25, loc:"grind",
        g:"Must be cast on a valid target to count. Terminal-and-reload works; otherwise use it freely in combat since it's strong crowd control anyway." },
    ]},
  { num:"P2", title:"Throwaway Engineer — Tech Grind",
    note:"Make a generic Engineer. Same terminal-and-reload farming applies. Banking talent points then hard-saving before spending lets you unlock the deeper abilities efficiently.",
    items:[
      { n:"Sabotage Specialist", d:"Use Sabotage 25 times", max:25, loc:"grind",
        g:"Available early for the Engineer. Cast on the Citadel transit terminal and reload, or use it on enemy weapons in combat." },
      { n:"Electronics Specialist", d:"Use Shield Overload 25 times", max:25, loc:"grind",
        g:"Use Overload 25 times. <strong>Note:</strong> this is the *usage* achievement — distinct from the combat 'deplete 25 shields' one in Phase 3. Terminal-and-reload grinds it fast." },
      { n:"Damping Specialist", d:"Use Damping Field 25 times", max:25, loc:"grind",
        g:"A mid-tier tech power; invest points to unlock, then farm on the terminal. Damping must hit a target to register." },
      { n:"Neural Shock Specialist", d:"Use Neural Shock 25 times", max:25, loc:"grind",
        g:"<span class='hl'>The one tech power Liara/Tali can't help with</span> — only Kaidan, Engineer, or Sentinel have it. Your throwaway Engineer covers it. Cast on any organic target." },
      { n:"AI Hacking Specialist", d:"Use AI Hacking 25 times", max:25, loc:"grind",
        g:"<strong>Requires 7 points in Decryption to unlock.</strong> Bank points, hard-save, then dump them in. Hack synthetic enemies, or reload the terminal save repeatedly." },
    ]},
  { num:"P3", title:"Main Run — Completionist Playthrough",
    note:"Your real Shepard, any class. <em>Do everything</em>: every mission, every assignment, every planet, every dialogue. With abilities already cleared, this run is pure content.",
    items:[
      { n:"Overload Specialist", d:"Disrupt the shields of 25 enemies", max:25, loc:"combat",

         priority:["Master and Commander","Savior","Hijacker","Problem Solver","Fact Finder","Tunnel Rat","Saboteur","Liberator","Paramour (ME3)"] },
};
let CUR = "me1";          // current game key
let G = GAMES[CUR];       // shorthand to current game's data

const KEY = "me1_checklist_v5";
function blankGame(){ return { done:{}, count:{}, notes:{} }; }
let state = { games:{ me1:blankGame(), me2:blankGame(), me3:blankGame() }, spoilers:false, view:"phase", cur:"me1" };
// accessors for the CURRENT game's progress
function gp(){ return state.games[CUR]; }
function DN(id){ return gp().done; }
function CT(){ return gp().count; }
function NT(){ return gp().notes; }
const phasesEl = document.getElementById("phases");

// flatten for stable IDs (phase index . item index) — ID stays constant regardless of view
function eachItem(cb){ G.data.forEach((ph,pi)=>ph.items.forEach((it,ii)=>cb(it,`${pi}_${ii}`,ph))); }

// name -> {it,id} so the route view can reuse the real checkboxes
let BY_NAME = {};
function rebuildByName(){ BY_NAME = {}; eachItem((it,id)=>{ BY_NAME[it.n] = {it,id}; }); }
rebuildByName();

// Storage adapter: use Claude's artifact storage if present, otherwise
// fall back to the browser's localStorage (works when the file is opened directly).
const store = {
  async get(k){
    if (window.storage && typeof window.storage.get === "function"){
      try { return await window.storage.get(k); } catch(e){ /* fall through */ }
    }
    try { const v = localStorage.getItem(k); return v ? { value:v } : null; }
    catch(e){ return null; }
  },
  async set(k,v){
    if (window.storage && typeof window.storage.set === "function"){
      try { return await window.storage.set(k,v); } catch(e){ /* fall through */ }
    }
    try { localStorage.setItem(k,v); } catch(e){}
  }
};

function applyGame(){
  CUR = state.cur || "me1";
  G = GAMES[CUR];
  rebuildByName();
  // header + game tabs reflect current game
  document.getElementById("gameTitleNum").textContent = G.full;
  document.querySelectorAll("#gameSeg button").forEach(b=>b.classList.toggle("active", b.dataset.game===CUR));
}

async function load(){
  try {
    const r = await store.get(KEY);
    if (r && r.value){
      const saved = JSON.parse(r.value);
      // merge while preserving the per-game structure
      if (saved.games) state.games = Object.assign(state.games, saved.games);
      if (typeof saved.spoilers==="boolean") state.spoilers = saved.spoilers;
      if (saved.view) state.view = saved.view;
      if (saved.cur) state.cur = saved.cur;
      // migrate a v4 flat save (done/count/notes at top level) into me1
      if (saved.done || saved.count || saved.notes){
        state.games.me1 = { done:saved.done||{}, count:saved.count||{}, notes:saved.notes||{} };
      }
    }
  } catch(e){}
  applyGame();
  document.getElementById("spoilerToggle").checked = !!state.spoilers;
  document.body.classList.toggle("show-spoilers", !!state.spoilers);
  document.querySelectorAll("#viewSeg button").forEach(b=>b.classList.toggle("active", b.dataset.view===state.view));
  render();
}
async function save(){
  try { await store.set(KEY, JSON.stringify(state)); } catch(e){}
}

function isDone(it,id){
  if (it.max) return (CT()[id]||0) >= it.max;
  return !!DN()[id];
}

function buildItemLi(it, id){
  const li = document.createElement("li");
  li.className = "item";
  if (isDone(it,id)) li.classList.add("done");
  const tag = it.t ? `<span class="tag ${it.t}">${it.t==="miss"?"Missable":"Optional"}</span>` : "";
  const hasNote = NT()[id] && NT()[id].trim();

  const row = document.createElement("div");
  row.className = "item-row";

  // counter OR checkbox
  let leftControl;
  if (it.max){
    const cur = CT()[id]||0;
    row.innerHTML = `
      <div class="counter">
        <button class="cdn">−</button>
        <span class="cval ${cur>=it.max?'full':''}">${cur} / ${it.max}</span>
        <button class="cup">+</button>
      </div>
      <div class="task">
        <div class="task-name">${it.n}${tag}</div>
        <div class="task-desc">${it.d}</div>
      </div>
      <div class="btns-right">
        <button class="note-btn ${hasNote?'has-note':''}">Note</button>
        <button class="guide-btn">Guide</button>
      </div>`;
    const cval = row.querySelector(".cval");
    const upd = ()=>{
      const v = CT()[id]||0;
      cval.textContent = `${v} / ${it.max}`;
      cval.classList.toggle("full", v>=it.max);
      li.classList.toggle("done", v>=it.max);
      save(); refreshMeta(); refreshPriority();
    };
    row.querySelector(".cup").addEventListener("click",(e)=>{ e.stopPropagation();
      CT()[id]=Math.min(it.max,(CT()[id]||0)+1); upd(); });
    row.querySelector(".cdn").addEventListener("click",(e)=>{ e.stopPropagation();
      CT()[id]=Math.max(0,(CT()[id]||0)-1); upd(); });
  } else {
    row.innerHTML = `
      <div class="checkzone">
        <div class="box"></div>
        <div class="task">
          <div class="task-name">${it.n}${tag}</div>
          <div class="task-desc">${it.d}</div>
        </div>
      </div>
      <div class="btns-right">
        <button class="note-btn ${hasNote?'has-note':''}">Note</button>
        <button class="guide-btn">Guide</button>
      </div>`;
    row.querySelector(".checkzone").addEventListener("click",()=>{
      DN()[id]=!DN()[id];
      li.classList.toggle("done", DN()[id]);
      save(); refreshMeta(); refreshPriority();
    });
  }

  // guide
  const guide = document.createElement("div");
  guide.className = "guide"; guide.innerHTML = it.g;
  const gbtn = row.querySelector(".guide-btn");
  gbtn.addEventListener("click",(e)=>{ e.stopPropagation();
    guide.classList.toggle("show"); gbtn.classList.toggle("open");
    gbtn.textContent = guide.classList.contains("show")?"Hide":"Guide"; });

  // note
  const noteArea = document.createElement("div");
  noteArea.className = "note-area";
  const ta = document.createElement("textarea");
  ta.placeholder = "Your notes — e.g. 'saved at C-Sec terminal', 'Wrex done, Tali needs 2'…";
  ta.value = NT()[id]||"";
  ta.addEventListener("input",()=>{ NT()[id]=ta.value; save(); });
  ta.addEventListener("blur",()=>{
    nbtn.classList.toggle("has-note", ta.value.trim()!==""); });
  noteArea.appendChild(ta);
  const nbtn = row.querySelector(".note-btn");
  nbtn.addEventListener("click",(e)=>{ e.stopPropagation();
    noteArea.classList.toggle("show"); nbtn.classList.toggle("open");
    if (noteArea.classList.contains("show")) ta.focus(); });

  li.appendChild(row); li.appendChild(guide); li.appendChild(noteArea);
  return li;
}

function makeSection(num, title, note, items, isPlanner){
  const section = document.createElement("section");
  section.className = "phase" + (isPlanner?" planner-group":"");
  let dn=0; items.forEach(({it,id})=>{ if(isDone(it,id)) dn++; });
  const head = document.createElement("div");
  head.className="phase-head";
  head.innerHTML = `<span class="phase-num">${num}</span><span class="phase-title">${title}</span><span class="phase-count">${dn}/${items.length}</span>`;
  const body = document.createElement("div"); body.className="phase-body";
  const nt = document.createElement("div"); nt.className="phase-note"; nt.innerHTML=note; body.appendChild(nt);
  const ul = document.createElement("ul");
  items.forEach(({it,id})=> ul.appendChild(buildItemLi(it,id)));
  body.appendChild(ul); section.appendChild(head); section.appendChild(body);
  head.addEventListener("click",()=>{ body.style.display = body.style.display==="none"?"":"none"; });
  return section;
}

function render(){
  phasesEl.innerHTML="";
  if (state.view==="phase"){
    G.data.forEach((ph,pi)=>{
      const items = ph.items.map((it,ii)=>({it,id:`${pi}_${ii}`}));
      phasesEl.appendChild(makeSection(ph.num, ph.title, ph.note, items, false));
    });
  } else if (state.view==="planner"){
    G.planner.forEach(grp=>{
      const items=[];
      eachItem((it,id)=>{ if(it.loc===grp.key) items.push({it,id}); });
      if (items.length) phasesEl.appendChild(makeSection(grp.num, grp.title, grp.note, items, true));
    });
  } else if (state.view==="route"){
    renderRoute();
  } else {
    renderBuild();
  }
  refreshMeta(); refreshPriority();
}

function renderRoute(){
  G.route.forEach(step=>{
    const items = step.secures.map(n=>BY_NAME[n]).filter(Boolean);
    phasesEl.appendChild(makeSection(step.num, step.title, step.body, items, true));
  });
}

function renderBuild(){
  const b = G.build;
  if (!b){ return; }
  // intro card
  const intro = document.createElement("section");
  intro.className = "phase build-intro";
  intro.innerHTML = `
    <div class="phase-head" style="cursor:default">
      <span class="phase-num">SOLDIER</span>
      <span class="phase-title">${G.label} Build — Soldier</span>
    </div>
    <div class="build-intro-body">${b.intro}</div>`;
  phasesEl.appendChild(intro);

  // each section as a collapsible card
  b.sections.forEach((sec,i)=>{
    const s = document.createElement("section");
    s.className = "phase build-section";
    const head = document.createElement("div");
    head.className = "phase-head";
    head.innerHTML = `<span class="phase-num build-bullet">${String(i+1).padStart(2,"0")}</span><span class="phase-title build-h">${sec.h}</span><span class="phase-count">▾</span>`;
    const body = document.createElement("div");
    body.className = "phase-body";
    const inner = document.createElement("div");
    inner.className = "build-body";
    inner.innerHTML = sec.html;
    body.appendChild(inner);
    s.appendChild(head); s.appendChild(body);
    const caret = head.querySelector(".phase-count");
    head.addEventListener("click",()=>{
      const hidden = body.style.display==="none";
      body.style.display = hidden ? "" : "none";
      caret.textContent = hidden ? "▾" : "▸";
    });
    phasesEl.appendChild(s);
  });
}

function refreshMeta(){
  // build view isn't a checklist — hide progress + priority, skip counting
  const isBuild = state.view==="build";
  const ps = document.querySelector(".progress-shell");
  const pr = document.getElementById("priorityStrip");
  if (ps) ps.style.display = isBuild ? "none" : "";
  if (isBuild){ if(pr) pr.innerHTML=""; return; }
  let total=0, done=0;
  eachItem((it,id)=>{ total++; if(isDone(it,id)) done++; });
  const pct = total?Math.round(done/total*100):0;
  document.getElementById("pct").textContent = pct+"%";
  document.getElementById("barFill").style.width = pct+"%";
  document.getElementById("statusText").textContent = `${done} / ${total} OBJECTIVES LOGGED`;
  document.getElementById("banner").classList.toggle("show", done===total && total>0);
  // trilogy-wide total across all three games
  let tDone=0, tTotal=0; const per={};
  for (const key of ["me1","me2","me3"]){
    const gm=GAMES[key], bucket=state.games[key]||blankGame();
    let d=0,t=0;
    gm.data.forEach((ph,pi)=>ph.items.forEach((it,ii)=>{
      const id=`${pi}_${ii}`; t++;
      const done2 = it.max ? (bucket.count[id]||0)>=it.max : !!bucket.done[id];
      if(done2) d++;
    }));
    per[key]={d,t}; tDone+=d; tTotal+=t;
  }
  const tt = document.getElementById("trilogyTotal");
  if (tt){
    const pctAll = tTotal?Math.round(tDone/tTotal*100):0;
    tt.innerHTML = `TRILOGY <b>${tDone}/${tTotal}</b> (${pctAll}%)  ·  ` +
      `ME1 <span class="${per.me1.d===per.me1.t?'seg-done':''}">${per.me1.d}/${per.me1.t}</span>  ` +
      `ME2 <span class="${per.me2.d===per.me2.t?'seg-done':''}">${per.me2.d}/${per.me2.t}</span>  ` +
      `ME3 <span class="${per.me3.d===per.me3.t?'seg-done':''}">${per.me3.d}/${per.me3.t}</span>`;
  }
  // update visible phase counts live
  document.querySelectorAll(".phase").forEach(sec=>{
    const c = sec.querySelector(".phase-count");
    const lis = sec.querySelectorAll("li.item");
    let d=0; lis.forEach(li=>{ if(li.classList.contains("done")) d++; });
    if(c) c.textContent = `${d}/${lis.length}`;
  });
}

// Priority strip: surface uncleared missables, most time-sensitive first
function priorityOrder(){ return G.priority || []; }
function refreshPriority(){
  const strip = document.getElementById("priorityStrip");
  const open=[];
  eachItem((it,id)=>{
    if (it.t==="miss" || priorityOrder().includes(it.n)){
      if(!isDone(it,id)) open.push(it.n);
    }
  });
  if (!open.length){ strip.innerHTML=""; return; }
  open.sort((a,b)=>{
    const PO=priorityOrder(); const ia=PO.indexOf(a), ib=PO.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });
  const top = open.slice(0,4);
  strip.innerHTML = `<div class="priority-inner">
    <div class="priority-title">Don't lose these — missable / time-sensitive</div>
    ${top.map(n=>`<div class="priority-item">${n}</div>`).join("")}
  </div>`;
}

/* ---- controls ---- */
document.getElementById("spoilerToggle").addEventListener("change",(e)=>{
  state.spoilers=e.target.checked;
  document.body.classList.toggle("show-spoilers", state.spoilers);
  save();
});
document.querySelectorAll("#gameSeg button").forEach(b=>{
  b.addEventListener("click",()=>{
    state.cur=b.dataset.game;
    applyGame();
    // collapse-state resets cleanly on game change; re-render fresh
    save(); render();
    window.scrollTo({top:0, behavior:"smooth"});
  });
});
document.querySelectorAll("#viewSeg button").forEach(b=>{
  b.addEventListener("click",()=>{
    state.view=b.dataset.view;
    document.querySelectorAll("#viewSeg button").forEach(x=>x.classList.toggle("active",x===b));
    save(); render();
  });
});
document.getElementById("reset").addEventListener("click",()=>{
  if(confirm(`Wipe ${G.label} progress, counters, and notes? (Other games are kept.)`)){
    state.games[CUR]=blankGame();
    save(); render();
  }
});
document.getElementById("expandAll").addEventListener("click",()=>
  document.querySelectorAll(".phase-body").forEach(b=>b.style.display=""));
document.getElementById("collapseAll").addEventListener("click",()=>
  document.querySelectorAll(".phase-body").forEach(b=>b.style.display="none"));

/* ---- export / import ---- */
const modalBg=document.getElementById("modalBg");
const exportArea=document.getElementById("exportArea");
document.getElementById("exportBtn").addEventListener("click",()=>{
  // full trilogy summary + machine code (all three games)
  const blocks=[];
  ["me1","me2","me3"].forEach(key=>{
    const gm=GAMES[key], bucket=state.games[key]||blankGame();
    let done=0,total=0; const lines=[];
    gm.data.forEach((ph,pi)=>ph.items.forEach((it,ii)=>{
      const id=`${pi}_${ii}`; total++;
      const d = it.max ? (bucket.count[id]||0)>=it.max : !!bucket.done[id];
      if(d)done++;
      const c = it.max ? ` (${bucket.count[id]||0}/${it.max})` : "";
      const nt = bucket.notes[id]&&bucket.notes[id].trim() ? `  — ${bucket.notes[id].trim()}` : "";
      lines.push(`[${d?"x":" "}] ${it.n}${c}${nt}`);
    }));
    blocks.push(`MASS EFFECT ${gm.full} — ${done}/${total} (${total?Math.round(done/total*100):0}%)\n`+
      `${"-".repeat(40)}\n`+lines.join("\n"));
  });
  const summary = `MASS EFFECT LEGENDARY EDITION — 100% LOG\n${"=".repeat(40)}\n\n` +
    blocks.join("\n\n") +
    `\n\n--- RESTORE CODE (paste to import) ---\n` + btoa(JSON.stringify(state));
  exportArea.value = summary;
  modalBg.classList.add("show");
});
document.getElementById("copyBtn").addEventListener("click",()=>{
  exportArea.select();
  navigator.clipboard?.writeText(exportArea.value).then(
    ()=>{ document.getElementById("copyBtn").textContent="Copied!"; setTimeout(()=>document.getElementById("copyBtn").textContent="Copy",1500); }
  ).catch(()=>{});
});
document.getElementById("importBtn").addEventListener("click",()=>{
  const m = exportArea.value.match(/RESTORE CODE \(paste to import\) ---\n([A-Za-z0-9+/=]+)/);
  const code = m ? m[1] : exportArea.value.trim();
  try {
    const obj = JSON.parse(atob(code));
    Object.assign(state, obj);
    save(); load(); modalBg.classList.remove("show");
  } catch(e){ alert("Couldn't read that code. Paste the full restore code or the whole export text."); }
});
document.getElementById("closeModal").addEventListener("click",()=>modalBg.classList.remove("show"));
modalBg.addEventListener("click",(e)=>{ if(e.target===modalBg) modalBg.classList.remove("show"); });

load();
</script>
</body>
